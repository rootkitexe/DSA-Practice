<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infosys DSA Interview Prep</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a26;
    --border: #2a2a3d;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --green: #43e97b;
    --yellow: #f9ca24;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --easy: #43e97b;
    --medium: #f9ca24;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(108,99,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(108,99,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 24px 20px 60px; }

  /* Header */
  header { text-align: center; padding: 40px 0 32px; }
  .badge {
    display: inline-block;
    background: rgba(108,99,255,0.15);
    border: 1px solid rgba(108,99,255,0.4);
    color: var(--accent);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 5px 14px;
    border-radius: 20px;
    margin-bottom: 16px;
    text-transform: uppercase;
  }
  h1 { font-size: clamp(28px, 5vw, 42px); font-weight: 800; line-height: 1.1; }
  h1 span { color: var(--accent); }
  .subtitle { color: var(--muted); margin-top: 10px; font-size: 15px; }

  /* Progress bar */
  .progress-wrap { margin: 24px 0 32px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .progress-bar { height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 4px; transition: width 0.4s ease; }

  /* Filter tabs */
  .filter-tabs { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
  .tab {
    padding: 7px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab:hover { border-color: var(--accent); color: var(--text); }
  .tab.active { background: var(--accent); border-color: var(--accent); color: white; }
  .tab.easy-tab.active { background: var(--easy); border-color: var(--easy); color: #000; }
  .tab.medium-tab.active { background: var(--yellow); border-color: var(--yellow); color: #000; }

  /* Problem list */
  .problem-list { display: flex; flex-direction: column; gap: 10px; }

  .problem-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .problem-card:hover { border-color: rgba(108,99,255,0.4); }
  .problem-card.mastered { border-color: rgba(67,233,123,0.3); }

  .problem-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
    cursor: pointer;
    user-select: none;
  }

  .problem-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    min-width: 32px;
  }
  .difficulty-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .easy .difficulty-dot { background: var(--easy); box-shadow: 0 0 6px var(--easy); }
  .medium .difficulty-dot { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }

  .problem-title { flex: 1; font-weight: 700; font-size: 15px; }
  .topic-tag {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 10px;
    background: rgba(108,99,255,0.1);
    color: var(--accent);
    border: 1px solid rgba(108,99,255,0.2);
    white-space: nowrap;
  }
  .mastered-badge {
    font-size: 11px;
    color: var(--green);
    font-weight: 700;
    display: none;
  }
  .problem-card.mastered .mastered-badge { display: block; }

  .chevron {
    color: var(--muted);
    font-size: 12px;
    transition: transform 0.3s;
    margin-left: 4px;
  }
  .problem-card.open .chevron { transform: rotate(180deg); }

  /* Expanded content */
  .problem-body {
    display: none;
    border-top: 1px solid var(--border);
    padding: 0;
  }
  .problem-card.open .problem-body { display: block; }

  .qa-section { padding: 20px 20px 4px; }
  .qa-item { margin-bottom: 20px; }

  .q-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .q-label::before {
    content: '';
    display: inline-block;
    width: 3px; height: 14px;
    background: var(--accent);
    border-radius: 2px;
  }
  .q-label.q2::before { background: #ff6584; }
  .q-label.q2 { color: #ff6584; }
  .q-label.q3::before { background: var(--yellow); }
  .q-label.q3 { color: var(--yellow); }
  .q-label.q4::before { background: var(--green); }
  .q-label.q4 { color: var(--green); }

  .a-text {
    font-size: 14px;
    line-height: 1.7;
    color: #c8c8e0;
    background: rgba(255,255,255,0.03);
    padding: 12px 14px;
    border-radius: 8px;
    border-left: 2px solid var(--border);
  }

  .complexity-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
  .chip {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 6px;
    font-weight: 500;
  }
  .chip.time { background: rgba(249,202,36,0.1); color: var(--yellow); border: 1px solid rgba(249,202,36,0.25); }
  .chip.space { background: rgba(108,99,255,0.1); color: #a89cff; border: 1px solid rgba(108,99,255,0.25); }

  .master-btn {
    display: block;
    width: calc(100% - 40px);
    margin: 12px 20px 20px;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .master-btn:hover { border-color: var(--green); color: var(--green); background: rgba(67,233,123,0.05); }
  .problem-card.mastered .master-btn {
    border-color: rgba(67,233,123,0.4);
    color: var(--green);
    background: rgba(67,233,123,0.08);
  }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="badge">Infosys Interview Prep</div>
    <h1>DSA Master<span>Guide</span></h1>
    <p class="subtitle">29 problems · 4 interview questions each · Mark what you've mastered</p>
  </header>

  <div class="progress-wrap">
    <div class="progress-label">
      <span>Mastery Progress</span>
      <span id="progress-text">0 / 29 mastered</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>

  <div class="filter-tabs">
    <button class="tab active" onclick="filterProblems('all', this)">All (29)</button>
    <button class="tab easy-tab" onclick="filterProblems('easy', this)">🟢 Easy (13)</button>
    <button class="tab medium-tab" onclick="filterProblems('medium', this)">🟡 Medium (16)</button>
    <button class="tab" onclick="filterProblems('mastered', this)">✅ Mastered</button>
    <button class="tab" onclick="filterProblems('unmastered', this)">📌 Remaining</button>
  </div>

  <div class="problem-list" id="problem-list"></div>
</div>

<script>
const problems = [
  {
    num: 1, title: "Two Sum", topic: "HashMap", difficulty: "easy",
    approach: "I iterate through the array once. For each number, I calculate the complement (target minus current number) and check if it's already in a hashmap. If it is, I return the stored index and the current index. If not, I store the current number and its index in the hashmap.",
    algorithm: "I used a HashMap (dictionary) because it gives O(1) average-time lookup. The brute-force would be two nested loops — O(n²) — but with a hashmap I can solve it in a single pass. The key insight is: instead of searching for a pair, I ask 'have I already seen the complement of this number?'",
    time: "O(n)", space: "O(n)",
    complexityNote: "We scan the array once — O(n) time. In the worst case we store every element in the hashmap — O(n) space.",
    better: "The hashmap approach already is the optimal solution. The only trade-off to discuss: a brute-force O(n²) solution uses O(1) space, so if space is extremely limited and n is small, brute force could be argued. But for any reasonable input, the hashmap is best."
  },
  {
    num: 3, title: "Longest Substring Without Repeating Characters", topic: "Sliding Window", difficulty: "easy",
    approach: "I maintain a sliding window with two pointers — left and right. I expand the right pointer, and whenever I encounter a character that's already in the window, I move the left pointer forward until that duplicate is removed. I track characters in a hashset and update the max length at each step.",
    algorithm: "Sliding Window because the problem asks for an optimal contiguous subarray/substring. A hashset lets me check for duplicates in O(1), and by only moving pointers forward I avoid redundant work. Brute force would check all substrings — O(n³) or O(n²) — but sliding window gives O(n).",
    time: "O(n)", space: "O(min(n, m))",
    complexityNote: "Each character is visited at most twice (once by right, once by left pointer) — O(n). Space is O(min(n, m)) where m is the character set size (e.g., 26 for lowercase letters).",
    better: "We can optimize further by storing the index of each character in a hashmap instead of a set. That way, when we find a duplicate, we can jump the left pointer directly to the correct position instead of moving it one step at a time — still O(n) but with fewer iterations in practice."
  },
  {
    num: 20, title: "Valid Parentheses", topic: "Stack", difficulty: "easy",
    approach: "I iterate through the string. For every opening bracket — '(', '{', '[' — I push it onto a stack. For every closing bracket, I check if the top of the stack has the matching opening bracket. If it does, I pop it; if not, I return false. At the end, the stack should be empty for a valid string.",
    algorithm: "A Stack is the natural choice because brackets must be closed in LIFO order — the most recently opened bracket must be closed first. This mirrors exactly what a stack does. Any other data structure would make this logic much more complex.",
    time: "O(n)", space: "O(n)",
    complexityNote: "We traverse the string once — O(n). In the worst case (all opening brackets), we push every character onto the stack — O(n) space.",
    better: "This is already optimal. One minor optimization: if the string length is odd, we can immediately return false without any further processing."
  },
  {
    num: 21, title: "Merge Two Sorted Lists", topic: "Linked List", difficulty: "easy",
    approach: "I use a dummy head node to simplify edge cases. I compare the current nodes of both lists, attach the smaller one to my result list, and advance that pointer. I keep going until one list is exhausted, then I append the remaining part of the other list directly.",
    algorithm: "This is a classic two-pointer merge. Since both lists are already sorted, I never need to backtrack — I just compare the front of each and greedily pick the smaller one. This is the same logic as the merge step in merge sort.",
    time: "O(m + n)", space: "O(1)",
    complexityNote: "m and n are the lengths of the two lists. We visit each node exactly once — O(m+n). We only use a few pointer variables — O(1) space (no new nodes created, just relinking).",
    better: "A recursive solution is equally valid and cleaner to read — base case handles null lists, recursive case compares heads. Same time complexity, but O(m+n) space on the call stack. The iterative approach is better for very long lists to avoid stack overflow."
  },
  {
    num: 53, title: "Maximum Subarray", topic: "Kadane's Algorithm", difficulty: "easy",
    approach: "I scan the array left to right, maintaining a running sum. At each element, I decide: is it better to extend the existing subarray or start fresh from this element? I pick whichever is larger. I track the maximum sum seen at any point.",
    algorithm: "Kadane's Algorithm — a classic dynamic programming approach. The key insight is that if the running sum becomes negative, it only hurts any future subarray, so we reset it to zero and start fresh. This avoids the O(n²) brute force of checking all subarrays.",
    time: "O(n)", space: "O(1)",
    complexityNote: "Single pass through the array — O(n). We only store two variables (current sum and max sum) — O(1) space.",
    better: "Kadane's is already optimal for this problem. A divide-and-conquer approach also solves it in O(n log n) but offers no advantage here. For the follow-up (return the actual subarray, not just sum), we track start and end indices of the best subarray."
  },
  {
    num: 121, title: "Best Time to Buy and Sell Stock", topic: "Array/Greedy", difficulty: "easy",
    approach: "I scan prices once, tracking the minimum price seen so far. For each day, I calculate potential profit as today's price minus the minimum so far, and update my maximum profit if this is better. The key constraint is buy must come before sell — tracking the minimum so far handles this automatically.",
    algorithm: "Greedy — I make the locally optimal choice at each step: always buy at the lowest historical price. A brute force with two loops checks all pairs — O(n²). The greedy single-pass approach works because the optimal buy day must always be the minimum price before the optimal sell day.",
    time: "O(n)", space: "O(1)",
    complexityNote: "One pass through prices — O(n). Only two variables stored — O(1) space.",
    better: "This is already optimal. For the variant where you can make multiple transactions (problem 122), a different greedy works: add every positive difference between consecutive days."
  },
  {
    num: 206, title: "Reverse a Linked List", topic: "Linked List", difficulty: "easy",
    approach: "I use three pointers: prev (starts null), curr (starts at head), and next. I iterate: save the next node, reverse the current node's pointer to point to prev, then shift both prev and curr forward. At the end, prev is the new head.",
    algorithm: "Iterative pointer manipulation — the most space-efficient approach. A recursive solution also works but uses O(n) call stack space. The iterative approach does an in-place reversal by simply flipping each node's 'next' pointer one at a time.",
    time: "O(n)", space: "O(1)",
    complexityNote: "We visit each node once — O(n). We use only three pointers — O(1) space.",
    better: "Both iterative (O(1) space) and recursive (O(n) stack space) solutions are O(n) time. The iterative approach is better in practice. If I wanted to reverse only a portion of the list, I'd extend this to the 'Reverse Linked List II' variant."
  },
  {
    num: 200, title: "Number of Islands", topic: "BFS/DFS", difficulty: "medium",
    approach: "I iterate through every cell in the grid. When I find a '1' (land), I increment my island counter and then use DFS to mark all connected land cells as visited (I change them to '0' or '-1' to avoid revisiting). This way, I count each island exactly once.",
    algorithm: "DFS or BFS — both work equally well. I prefer DFS for its simpler recursive implementation. The core idea is flood-fill: once you find unvisited land, explore and 'sink' the entire connected island so you don't count it again.",
    time: "O(m × n)", space: "O(m × n)",
    complexityNote: "Every cell is visited at most once — O(m×n) where m and n are grid dimensions. DFS recursion stack can go as deep as the grid size in worst case — O(m×n) space.",
    better: "Union-Find (Disjoint Set Union) is an alternative — each cell is a node, and we union neighboring land cells. It gives similar complexity but is more complex to implement. BFS uses a queue instead of recursion, which avoids potential stack overflow for very large grids."
  },
  {
    num: 242, title: "Valid Anagram", topic: "String/HashMap", difficulty: "easy",
    approach: "I first check if both strings have the same length — if not, they can't be anagrams. Then I count character frequencies in the first string using a hashmap, and decrement counts using the second string. If any count goes negative or any key is missing, they're not anagrams.",
    algorithm: "Character frequency counting with a hashmap. Anagrams are simply rearrangements of the same characters, so if two strings have identical character frequency maps, they're anagrams. Sorting both strings also works but is slower.",
    time: "O(n)", space: "O(1)",
    complexityNote: "Linear scan of both strings — O(n). The hashmap size is bounded by the alphabet size (26 for lowercase English) — so effectively O(1) space, not O(n).",
    better: "Sorting both strings and comparing — O(n log n) — is simpler to code but slower. The hashmap approach is optimal. If dealing with Unicode characters instead of just lowercase letters, the hashmap approach generalizes better than sorting."
  },
  {
    num: 268, title: "Missing Number", topic: "Math/XOR", difficulty: "easy",
    approach: "The sum of 0 to n is n*(n+1)/2. I compute this expected sum, then subtract the actual sum of the array. The difference is the missing number. Alternatively, XOR: XOR all numbers from 0 to n with all elements in the array — all duplicates cancel out, leaving the missing number.",
    algorithm: "Math (Gauss formula) is the cleanest approach — no extra space, single pass. XOR works on the principle that a XOR a = 0 and a XOR 0 = a, so XORing both the range and the array leaves only the unpaired number. Both avoid sorting or hash sets.",
    time: "O(n)", space: "O(1)",
    complexityNote: "Single pass through the array — O(n). Only a few variables used — O(1) space.",
    better: "Math and XOR are already optimal. A HashSet approach also works in O(n) time but O(n) space. The math approach is preferred in interviews for its elegance and O(1) space."
  },
  {
    num: 283, title: "Move Zeroes", topic: "Array", difficulty: "easy",
    approach: "I use a two-pointer approach with a 'write pointer' starting at 0. I scan through the array with a read pointer, and whenever I find a non-zero element, I write it to the write pointer position and advance it. After the scan, I fill all positions from the write pointer to the end with zeros.",
    algorithm: "Two-pointer in-place approach. The trick is to separate the 'valid elements' from zeros by maintaining a position to write the next non-zero. This avoids any extra array and does it in a single pass. A naive approach would use extra space.",
    time: "O(n)", space: "O(1)",
    complexityNote: "One scan of the array — O(n). Done entirely in-place — O(1) space.",
    better: "An alternative is to swap non-zero elements with zero elements — this maintains relative order and minimizes the total number of operations. Both are O(n). The swap approach avoids the second pass to fill zeros."
  },
  {
    num: 344, title: "Reverse String", topic: "Two Pointer", difficulty: "easy",
    approach: "I place one pointer at the start and one at the end of the array. I swap the characters at both pointers, then move them toward each other. I repeat until the pointers meet in the middle.",
    algorithm: "Two-pointer in-place swap — the most natural solution for reversing. Since we must do it in-place with O(1) extra space, two pointers is the obvious choice. No extra array, no library functions needed.",
    time: "O(n)", space: "O(1)",
    complexityNote: "We make n/2 swaps — O(n). In-place, no extra data structures — O(1) space.",
    better: "This is already optimal. In Python, s[::-1] does it in one line but creates a new array — O(n) space, which violates the in-place requirement. The two-pointer approach is the correct interview answer."
  },
  {
    num: 412, title: "Fizz Buzz", topic: "Basic Logic", difficulty: "easy",
    approach: "I iterate from 1 to n. For each number, I check divisibility in order: first by both 3 and 5 (print 'FizzBuzz'), then by 3 alone ('Fizz'), then by 5 alone ('Buzz'), else print the number itself. Order matters — check the combined case first.",
    algorithm: "Simple conditional logic with modulo operator. The key interview insight is the order of checks — if you check divisibility by 3 first and print 'Fizz', you'd miss the 'FizzBuzz' case. Always check the AND condition first.",
    time: "O(n)", space: "O(n)",
    complexityNote: "One loop from 1 to n — O(n). Storing the result list is O(n) space. If we just print instead of store, it's O(1) extra space.",
    better: "For a more extensible solution (common follow-up), use a list of (divisor, label) pairs and concatenate matching labels. This scales cleanly if more rules are added without changing the core loop logic."
  },
  {
    num: 2, title: "Add Two Numbers", topic: "Linked List", difficulty: "medium",
    approach: "I traverse both linked lists simultaneously, adding corresponding digits along with any carry from the previous step. I create a new node for each sum digit. After both lists are exhausted, if there's still a carry (from a final overflow), I add one more node with value 1.",
    algorithm: "Simulating manual addition digit by digit — the same way you add on paper, right to left. Since the lists are already stored in reverse order (least significant digit first), I can process them front to back without reversing. Carry propagation is the critical detail.",
    time: "O(max(m,n))", space: "O(max(m,n))",
    complexityNote: "We traverse both lists once — O(max(m,n)). We create at most max(m,n)+1 new nodes — O(max(m,n)) space.",
    better: "This is already the optimal approach for linked list representation. An alternative would be to convert both lists to integers, add them, and convert back — but this fails for very large numbers due to integer overflow, making the digit-by-digit approach more robust."
  },
  {
    num: 15, title: "3Sum", topic: "Two Pointer", difficulty: "medium",
    approach: "I sort the array first. Then for each element at index i, I use two pointers — left (i+1) and right (end) — to find pairs that sum to -nums[i]. If the three-way sum is too large, move right left; if too small, move left right. Skip duplicates at every step to avoid duplicate triplets.",
    algorithm: "Sort + Two Pointers. Sorting enables the two-pointer technique for the inner pair search. Without sorting, finding all triplets would be O(n³). After sorting, for each anchor element, the remaining problem reduces to 2Sum in a sorted array — which two pointers solve in O(n).",
    time: "O(n²)", space: "O(1) or O(n)",
    complexityNote: "Sorting is O(n log n). The outer loop runs n times, inner two-pointer scan is O(n) — total O(n²). Space is O(1) ignoring the output, or O(n) for the sorting space depending on implementation.",
    better: "O(n²) is the best known time complexity for this problem. HashSet approaches also hit O(n²). The sort+two-pointer approach is standard and expected. The hard part is handling duplicates correctly — practice skipping duplicate values for all three pointers."
  },
  {
    num: 22, title: "Generate Parentheses", topic: "Backtracking", difficulty: "medium",
    approach: "I use backtracking with two counters: open (opening brackets used so far) and close (closing brackets used). I can add '(' if open < n, and ')' if close < open. When both counters reach n, I've formed a valid combination and add it to results.",
    algorithm: "Backtracking — we build the string character by character and only place a bracket if it leads to a valid sequence. The constraints (open ≤ n, close ≤ open) are the pruning conditions that ensure we only generate valid combinations, avoiding the need to validate after generation.",
    time: "O(4ⁿ/√n)", space: "O(n)",
    complexityNote: "The number of valid combinations is the nth Catalan number — approximately O(4ⁿ/√n). Recursion depth goes up to 2n — O(n) stack space.",
    better: "This backtracking approach is considered optimal. A BFS/iterative approach is possible but more complex. The key optimization already in place is the pruning: we never generate invalid sequences and then discard them."
  },
  {
    num: 33, title: "Search in Rotated Sorted Array", topic: "Binary Search", difficulty: "medium",
    approach: "I use modified binary search. At each step, I determine which half is sorted by comparing mid with the left or right boundary. The key insight: at least one half is always sorted in a rotated array. I check if the target falls in the sorted half — if yes, search there; if no, search the other half.",
    algorithm: "Binary Search — we still get O(log n) because even in a rotated array, we can always determine which half is sorted and eliminate half the search space. A linear scan would be O(n), and this is the expected O(log n) solution.",
    time: "O(log n)", space: "O(1)",
    complexityNote: "We halve the search space at each step — O(log n). Only a few pointers stored — O(1) space.",
    better: "This is optimal. One alternative is to first find the rotation point (minimum element) with binary search, then do standard binary search on the correct segment — also O(log n) but with two passes. The single-pass approach here is cleaner."
  },
  {

let mastered = new Set(JSON.parse(localStorage.getItem('mastered') || '[]'));
let currentFilter = 'all';

function saveMastered() {
  localStorage.setItem('mastered', JSON.stringify([...mastered]));
}

function updateProgress() {
  const total = 29;
  const count = mastered.size;
  document.getElementById('progress-text').textContent = `${count} / ${total} mastered`;
  document.getElementById('progress-fill').style.width = `${(count/total)*100}%`;
}

function filterProblems(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function toggleCard(id) {
  const card = document.getElementById('card-' + id);
  card.classList.toggle('open');
}

function toggleMastered(num, e) {
  e.stopPropagation();
  if (mastered.has(num)) mastered.delete(num);
  else mastered.add(num);
  saveMastered();
  updateProgress();
  renderList();
}

function renderList() {
  const list = document.getElementById('problem-list');
  let filtered = problems.filter(p => {
    if (currentFilter === 'easy') return p.difficulty === 'easy';
    if (currentFilter === 'medium') return p.difficulty === 'medium';
    if (currentFilter === 'mastered') return mastered.has(p.num);
    if (currentFilter === 'unmastered') return !mastered.has(p.num);
    return true;
  });

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state">No problems in this filter yet.</div>';
    return;
  }

  list.innerHTML = filtered.map(p => {
    const isMastered = mastered.has(p.num);
    return `
    <div class="problem-card ${p.difficulty} ${isMastered ? 'mastered' : ''}" id="card-${p.num}">
      <div class="problem-header" onclick="toggleCard(${p.num})">
        <span class="problem-num">#${p.num}</span>
        <span class="difficulty-dot"></span>
        <span class="problem-title">${p.title}</span>
        <span class="mastered-badge">✓ Mastered</span>
        <span class="topic-tag">${p.topic}</span>
        <span class="chevron">▼</span>
      </div>
      <div class="problem-body">
        <div class="qa-section">
          <div class="qa-item">
            <div class="q-label">Explain your approach</div>
            <div class="a-text">${p.approach}</div>
          </div>
          <div class="qa-item">
            <div class="q-label q2">What algorithm did you use and why?</div>
            <div class="a-text">${p.algorithm}</div>
          </div>
          <div class="qa-item">
            <div class="q-label q3">Time & Space Complexity</div>
            <div class="complexity-chips">
              <span class="chip time">⏱ Time: ${p.time}</span>
              <span class="chip space">💾 Space: ${p.space}</span>
            </div>
            <div class="a-text" style="margin-top:8px">${p.complexityNote}</div>
          </div>
          <div class="qa-item">
            <div class="q-label q4">Can you think of a better approach?</div>
            <div class="a-text">${p.better}</div>
          </div>
        </div>
        <button class="master-btn" onclick="toggleMastered(${p.num}, event)">
          ${isMastered ? '✓ Marked as Mastered — Click to Undo' : 'Mark as Mastered'}
        </button>
      </div>
    </div>`;
  }).join('');
}

updateProgress();
renderList();
</script>
